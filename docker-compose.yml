version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fairsplit-postgres
    environment:
      POSTGRES_DB: fairsplit
      POSTGRES_USER: fairsplit
      POSTGRES_PASSWORD: fairsplit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairsplit"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fairsplit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fairsplit-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/fairsplit
      DATABASE_USERNAME: fairsplit
      DATABASE_PASSWORD: fairsplit
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-prod}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment to run the app via Docker (for prod-like testing)
    # profiles: ["full"]

volumes:
  postgres_data:
  redis_data:

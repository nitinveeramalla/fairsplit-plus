name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Build & Test ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fairsplit_test
          POSTGRES_USER: fairsplit
          POSTGRES_PASSWORD: fairsplit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean verify --no-transfer-progress
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/fairsplit_test
          DATABASE_USERNAME: fairsplit
          DATABASE_PASSWORD: fairsplit
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-not-used-in-production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

  # ── Code Quality ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check --no-transfer-progress
        continue-on-error: true  # warn only for now, tighten later

  # ── Docker Build Check ────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fairsplit-api:ci .

      - name: Verify image starts
        run: |
          docker run -d \
            --name test-container \
            -e DATABASE_URL=jdbc:postgresql://localhost:5432/dummy \
            -e JWT_SECRET=ci-check-only \
            -e ANTHROPIC_API_KEY=sk-dummy \
            -e SPRING_PROFILES_ACTIVE=test \
            fairsplit-api:ci
          sleep 5
          docker logs test-container
          docker rm -f test-container
